<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}(mw)²{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="page">
  <div class="container">
    <header>
      <nav>
        <ul>
          <li><a href="{{ url_for('root.index') }}">home</a></li>
          <li><a href="{{ url_for('health.dashboard') }}">health</a></li>
          <li><a href="{{ url_for('t7e.index') }}">t7e</a></li>
        </ul>
      </nav>
      <h1>{% block page_heading %}(mw)<sup>2</sup>{% endblock %}</h1>
      {% block page_subheading %}{% endblock %}
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer>
      <p class="text-muted">
        (mw)² – <a href="https://github.com/mikew686/ai-learn" rel="noopener noreferrer" target="_blank">https://github.com/mikew686/ai-learn</a>
      </p>
    </footer>
  </div>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
