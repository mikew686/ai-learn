<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}(mw)²{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-gradient-to-br from-stone-100 via-white to-amber-50/40 font-sans antialiased">
  <div class="mx-auto max-w-2xl px-6 py-16">
    <header class="mb-12">
      <nav class="flex flex-wrap items-center gap-x-6 gap-y-2 text-sm">
        <a href="{{ url_for('root.index') }}" class="font-medium text-stone-700 hover:text-stone-900">home</a>
        <a href="{{ url_for('health.index') }}" class="font-medium text-stone-700 hover:text-stone-900">health</a>
        <a href="{{ url_for('t7e.index') }}" class="font-medium text-stone-700 hover:text-stone-900">t7e</a>
      </nav>
      <h1 class="mt-4 text-4xl font-bold tracking-tight text-stone-800">{% block page_heading %}(mw)<sup>2</sup>{% endblock %}</h1>
      {% block page_subheading %}{% endblock %}
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <footer class="mt-16 border-t border-stone-200 pt-8">
      <p class="font-mono text-xs text-stone-400">
        (mw)² – <a href="https://github.com/mikew686/ai-learn" class="text-stone-500 hover:text-stone-700" rel="noopener noreferrer" target="_blank">https://github.com/mikew686/ai-learn</a>
      </p>
    </footer>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
