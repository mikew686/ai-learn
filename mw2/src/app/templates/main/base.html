<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=960">
  <title>{% block title %}(mw)²{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='images/Bust_Athena_Velletri_Glyptothek_Munich_213_icon.jpeg') }}" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="page">
  <div class="container">
    <header class="site-header">
      <img src="{{ url_for('static', filename='images/Bust_Athena_Velletri_Glyptothek_Munich_213_icon.jpeg') }}" alt="Bust of Athena, Glyptothek Munich" title="Bust of Athena, Glyptothek Munich" class="site-header-icon">
      <span class="site-title">(mw)²{% block header_page_name %}{% endblock %}</span>
    </header>

    <div class="layout-body">
      <aside class="side-panel">
        <nav class="side-panel-index">
          {% block index %}{% endblock %}
        </nav>
      </aside>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>

    <footer class="site-footer">
      <p>(mw)² – <a href="{{ url_for('about.index') }}">about</a> – <a href="https://github.com/mikew686/ai-learn" rel="noopener noreferrer" target="_blank">github.com/mikew686/ai-learn</a></p>
    </footer>
  </div>
  <script src="https://unpkg.com/htmx.org@2.0.0"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
