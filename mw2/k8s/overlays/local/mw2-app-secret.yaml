# Local only. Env for app and rqworker: connect to in-cluster Postgres (mw2_user/mw2_database) and Redis.
# Run postgres-init.sh so mw2_user and mw2_database exist. Cloud envs use external secrets.
# OPENROUTER_API_KEY: create mw2-openrouter by hand before deploy (no key in git):
#   kubectl create secret generic mw2-openrouter --from-literal=api-key='sk-or-xxx' -n mw2
apiVersion: v1
kind: Secret
metadata:
  name: mw2-app-env
type: Opaque
stringData:
  DATABASE_URL: "postgresql://mw2_user:local123@postgres:5432/mw2_database"
  REDIS_URL: "redis://redis:6379/0"
  SECRET_KEY: "local-dev-secret-change-in-prod"
