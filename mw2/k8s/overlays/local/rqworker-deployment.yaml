# Local overlay: run mw2 rqworker. Same image as app; CMD override to python -m rqworker.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rqworker
spec:
  replicas: 4
  selector:
    matchLabels:
      app: rqworker
  template:
    metadata:
      labels:
        app: rqworker
    spec:
      containers:
        - name: rqworker
          image: mw2:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - rqworker
          envFrom:
            - secretRef:
                name: mw2-app-env
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
